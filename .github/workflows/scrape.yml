name: Scrape LeafLink Sales (All Brands)

on:
  workflow_dispatch:        # manual + cron-job.org trigger this via the dispatch API
  push:
    branches: [main]
  # NOTE: do NOT also add a `schedule:` block if you trigger this from cron-job.org.
  # Stacking the two causes redundant/overlapping runs. Pick one scheduler.
  # schedule:
  #   - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: scrape-leaflink-mi
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          LEAFLINK_API_KEY: ${{ secrets.LEAFLINK_API_KEY }}
          LEAFLINK_SELLER_ID: '9105'      # Medfarms - 100 Shafer Processing
          LEAFLINK_BRAND: ''              # empty = ALL brands (this is the whole point of this repo)
          LEAFLINK_FROM_DATE: '2020-01-01'
          LEAFLINK_EXCLUDE_STATUSES: 'Cancelled,Rejected'
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sales_data.json
          git diff --staged --quiet || git commit -m "Auto-update sales_data.json [skip ci]"
          git push
