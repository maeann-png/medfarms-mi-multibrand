name: Scrape LeafLink Sales (All Brands)

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: scrape-leaflink-mi
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          LEAFLINK_API_KEY: ${{ secrets.LEAFLINK_API_KEY }}
          LEAFLINK_SELLER_ID: '9105'
          LEAFLINK_BRAND: ''
          LEAFLINK_FROM_DATE: '2020-01-01'
          LEAFLINK_EXCLUDE_STATUSES: 'Cancelled,Rejected'
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sales_data.json.gz
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Auto-update sales_data.json.gz [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main
