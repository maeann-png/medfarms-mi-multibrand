<style>
  :root {
    /* Medfarms · Michigan — "Lush Forest" green on dark forest */
    --bg: #15241a;
    --bg-elev: #1c2f22;
    --bg-elev-2: #26402f;
    --border: #33543e;
    --border-soft: #213528;
    --text: #eaf6ed;
    --text-dim: #9dc1a9;
    --text-faint: #688a73;
    --accent: #68ba7f;          /* Lush Forest sage — primary accent */
    --accent-dim: #4d9461;
    --accent-deep: #2e6f40;
    --warm: #e0a85a;
    --cool: #8fcba0;
    --rose: #e07594;
    --internal: #cfffdc;        /* mint — internal stores (distinct by lightness) */
    --internal-dim: #5fa67d;

    /* surface + motion system */
    --radius: 10px;
    --radius-sm: 7px;
    --shadow-card: inset 0 1px 0 rgba(234,246,237,0.03), 0 14px 34px -22px rgba(0,0,0,0.85);
    --ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(ellipse 1200px 600px at 80% -10%, rgba(104,186,127,0.05), transparent 60%),
      radial-gradient(ellipse 800px 400px at 0% 100%, rgba(46,111,64,0.06), transparent 60%);
  }

  .font-display { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 144; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  .app { max-width: 1600px; margin: 0 auto; padding: 32px 40px 80px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    padding-bottom: 26px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 0; position: relative;
  }
  .topbar::after {
    content: ''; position: absolute; left: 0; bottom: -1px; width: 168px; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .brand-mark { display: flex; align-items: center; gap: 20px; }
  .brand-name {
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 40px;
    letter-spacing: -0.025em; color: var(--text); line-height: 1;
  }
  .brand-name em { color: var(--accent); font-style: italic; font-weight: 400; }
  .brand-tag {
    margin-top: 9px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.22em; color: var(--text-faint);
  }
  .topbar-meta {
    display: flex; gap: 18px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .topbar-meta strong { color: var(--text); font-weight: 500; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* Brand tabs */
  .tabbar {
    display: flex; gap: 6px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin-bottom: 34px;
    padding-top: 8px;
  }
  .tab {
    background: transparent; border: none; cursor: pointer;
    padding: 18px 26px 16px; position: relative;
    font-family: 'Inter', sans-serif; color: var(--text-dim);
    display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
    transition: color 0.18s var(--ease), background 0.18s var(--ease);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  }
  .tab:hover { color: var(--text); background: var(--bg-elev); }
  .tab-name { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .tab-sub { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-faint); }
  .tab.active { color: var(--text); }
  .tab.active .tab-sub { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 3px;
    background: var(--accent); border-radius: 3px;
  }
  .tab.tab-all .tab-name { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; }
  .other-menu {
    position: absolute; top: 100%; left: 0; z-index: 50; min-width: 250px; margin-top: 4px;
    background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 4px;
    padding: 6px; box-shadow: 0 10px 28px rgba(0,0,0,0.55);
    display: flex; flex-direction: column; gap: 2px;
  }
  .other-item {
    display: flex; justify-content: space-between; gap: 18px; align-items: center;
    background: transparent; border: none; cursor: pointer; text-align: left;
    padding: 8px 10px; border-radius: 3px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px;
  }
  .other-item:hover { background: var(--bg-elev); }
  .other-item.sel { background: rgba(104,186,127,0.10); color: var(--accent); }
  .other-rev { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); }

  /* Quick range pills */
  .quick-ranges { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .quick-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); margin-right: 4px; }
  .quick-pill { background: var(--bg-elev); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 13px; border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; transition: color 0.18s var(--ease), border-color 0.18s var(--ease), background 0.18s var(--ease); }
  .quick-pill:hover { color: var(--text); border-color: var(--text-dim); }
  .quick-pill.active { background: rgba(104,186,127,0.12); border-color: var(--accent-dim); color: var(--accent); }

  /* Scope cards */
  .scope-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 30px; }
  .scope-card { text-align: left; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; transition: transform 0.2s var(--ease), border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease); }
  .scope-card:hover { border-color: var(--text-dim); background: var(--bg-elev-2); transform: translateY(-2px); }
  .scope-card.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
  .scope-card.scope-internal.active { border-color: var(--internal); box-shadow: inset 0 0 0 1px var(--internal); }
  .scope-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); }
  .scope-value { font-family: 'Fraunces', serif; font-size: 30px; line-height: 1.05; color: var(--text); font-variant-numeric: tabular-nums; }
  .scope-card.active .scope-value { color: var(--accent); }
  .scope-card.scope-internal.active .scope-value { color: var(--internal); }
  .scope-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  @media (max-width: 1100px) { .scope-cards { grid-template-columns: 1fr; } }

  /* Filter bar */
  .filters {
    display: flex; gap: 14px; flex-wrap: wrap;
    padding: 16px 20px; background: var(--bg-elev);
    border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 30px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
  .filter-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); }
  .filter-input, .filter-select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px;
    border-radius: var(--radius-sm); outline: none; transition: border-color 0.18s var(--ease);
  }
  .filter-input:focus, .filter-select:focus { border-color: var(--accent-dim); }
  .filter-input::placeholder { color: var(--text-faint); }
  .filter-reset {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em; border-radius: var(--radius-sm); cursor: pointer;
    align-self: flex-end; transition: color 0.18s var(--ease), border-color 0.18s var(--ease);
  }
  .filter-reset:hover { color: var(--text); border-color: var(--text-dim); }

  /* KPI grid */
  .kpi-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
    box-shadow: var(--shadow-card);
  }
  .kpi { background: var(--bg-elev); padding: 22px 22px; display: flex; flex-direction: column; gap: 6px; position: relative; transition: background 0.25s var(--ease); }
  .kpi:hover { background: var(--bg-elev-2); }
  .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-faint); }
  .kpi-value { font-family: 'Fraunces', serif; font-weight: 400; font-size: 33px; line-height: 1.1; letter-spacing: -0.025em; color: var(--text); font-variant-numeric: tabular-nums; }
  .kpi-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .kpi-accent .kpi-value { color: var(--accent); }
  .kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 24px; height: 2px; background: var(--accent); opacity: 0; transition: opacity 0.25s var(--ease), width 0.35s var(--ease); }
  .kpi:hover::before { opacity: 1; width: 56px; }
  .kpi-accent::before { opacity: 1; width: 100%; }
  .kpi-accent:hover::before { width: 100%; }

  .section { margin-bottom: 34px; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: 'Fraunces', serif; font-weight: 500; font-size: 20px; letter-spacing: -0.01em; }
  .section-title em { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .section-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.12em; }

  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-card); }

  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
  .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

  /* Rank list */
  .rank-list { display: flex; flex-direction: column; }
  .rank-row { display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border-soft); position: relative; }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .rank-name { font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text); font-variant-numeric: tabular-nums; font-weight: 500; }
  .rank-bar { position: absolute; bottom: 0; left: 38px; right: 0; height: 1px; background: var(--accent-dim); opacity: 0.4; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-faint); font-weight: 500; background: var(--bg-elev-2); position: sticky; top: 0; }
  .data-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-soft); color: var(--text); }
  .data-table tr:hover td { background: rgba(104,186,127,0.03); }
  .data-table .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; text-align: right; }
  .data-table .dim { color: var(--text-dim); }

  /* Internal stores section wrapper */
  .internal-zone {
    border: 1px solid var(--internal-dim);
    border-left: 3px solid var(--internal);
    border-radius: 4px;
    padding: 26px 26px 30px;
    margin-bottom: 34px;
    background: linear-gradient(180deg, rgba(207,255,220,0.05), transparent 220px);
  }
  .internal-zone .kpi-accent .kpi-value { color: var(--internal); }
  .internal-zone .kpi::before { background: var(--internal); }
  .internal-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--internal);
    border: 1px solid var(--internal-dim); border-radius: 2px; padding: 3px 9px; margin-bottom: 6px;
  }

  /* Current-inventory zone — allocated, accent-marked block */
  .inv-zone {
    border: 1px solid var(--accent-dim);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 26px 26px 30px;
    background: linear-gradient(180deg, rgba(104,186,127,0.05), transparent 220px);
  }
  .inv-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em; color: var(--accent);
    border: 1px solid var(--accent-dim); border-radius: 2px; padding: 3px 9px;
    margin-right: 12px; vertical-align: middle;
  }

  /* Status pill */
  .pill { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 2px; border: 1px solid; }
  .pill-completed { color: var(--accent); border-color: var(--accent-dim); background: rgba(104,186,127,0.06); }
  .pill-pending { color: var(--warm); border-color: var(--warm); background: rgba(224,168,90,0.06); }
  .pill-overdue { color: var(--rose); border-color: var(--rose); background: rgba(224,117,148,0.06); }

  .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty h2 { font-family: 'Fraunces', serif; font-weight: 400; font-style: italic; font-size: 28px; margin-bottom: 12px; color: var(--text); }
  .empty code { display: inline-block; background: var(--bg-elev); border: 1px solid var(--border); padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border-radius: 2px; color: var(--accent); margin: 0 2px; }

  @media (max-width: 1100px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-half { grid-template-columns: 1fr; }
  }

  /* Keyboard focus — visible ring on every interactive control */
  .tab:focus-visible, .quick-pill:focus-visible, .scope-card:focus-visible,
  .filter-reset:focus-visible, .other-item:focus-visible,
  .filter-input:focus-visible, .filter-select:focus-visible {
    outline: none; box-shadow: var(--ring);
  }

  /* Respect reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important; scroll-behavior: auto !important;
    }
    .scope-card:hover { transform: none; }
  }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ===========================================================================
   ACCOUNT ROUTING  —  EDIT THIS BLOCK TO RECLASSIFY ACCOUNTS
   ---------------------------------------------------------------------------
   Matching is "buyer name starts with" (case-insensitive), so a base entry
   like "Dispo - Romeo" also catches "Dispo - Romeo MED", etc.
   EXCLUDE is checked first, then INTERNAL, otherwise the account is WHOLESALE.
   =========================================================================== */
const EXCLUDE_ACCOUNTS = [
  "Chill CBD Ecommerce",
  "Dispo Ace Production",
  "GNO",                          // matches "GNO Enterprises - Backpack Boyz - Monroe"
];
const INTERNAL_STORES = [
  "Dispo - Bay City North",       // + "... MED"
  "Dispo - Bay City South",       // + "... MED"
  "Dispo - Battle Creek (Fire Creek)",   // your "Dispo - Fire Creek Battle Creek"
  "Dispo - Hazel Park",
  "Dispo - Romeo",
  "Dispo - Whitmore Lake",
];

const classifyAccount = (buyerName) => {
  const n = String(buyerName || '').trim().toLowerCase();
  if (!n) return 'wholesale';
  for (const e of EXCLUDE_ACCOUNTS) if (n.startsWith(e.toLowerCase())) return 'excluded';
  for (const s of INTERNAL_STORES) if (n.startsWith(s.toLowerCase())) return 'internal';
  return 'wholesale';
};
/* ========================================================================= */

/* BRAND GROUPING — your six named brands show individually; everything else
   (the distributed third-party brands like Mitten Extracts / Hashish Boyz /
   LayerCakeFarms, plus mixed-order leftovers and blanks) collapses into a
   single "Other Brands" entry in the dropdown and tabs. Move a name out of
   here to promote it to its own tab. */
const PRIMARY_BRANDS = ["Hyman", "Chill Medicated", "Value Pak Distro", "100 Shafer", "Homiez", "Covert Cups"];
const OTHER_BRANDS_LABEL = "Other Brands";
const displayBrand = (raw) => PRIMARY_BRANDS.includes((raw || "").trim()) ? (raw || "").trim() : OTHER_BRANDS_LABEL;
// Friendly names for the brands that live inside "Other Brands" (shown when the
// Other Brands tab is expanded). Unmapped values (e.g. mixed-order combos) show
// as-is. Add entries here as you identify more brand IDs.
const OTHER_ALIASES = { "Brand 2402": "Mitten Extracts", "Brand 2994": "Hashish Boyz", "Brand 2993": "LayerCakeFarms" };
const otherName = (raw) => { const b = (raw || "").trim(); return OTHER_ALIASES[b] || b || "(unlabeled)"; };
/* ========================================================================= */

if (typeof Recharts === 'undefined') {
  document.getElementById('root').innerHTML =
    '<div style="max-width:600px;margin:80px auto;padding:32px;background:#1c2f22;border:1px solid #33543e;border-radius:4px;color:#eaf6ed;font-family:sans-serif">' +
    '<h2 style="font-family:Fraunces,serif;font-weight:400;font-style:italic;margin-bottom:12px">Charts library didn\'t load</h2>' +
    '<p style="color:#9dc1a9;line-height:1.6">Recharts failed to load from the CDN — usually an ad blocker, firewall, or offline. Disable extensions for this page or refresh.</p></div>';
  throw new Error('Recharts failed to load');
}

const {
  ResponsiveContainer, LineChart, Line, BarChart, Bar, AreaChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, PieChart, Pie, Cell
} = Recharts;

// --- Helpers ----------------------------------------------------------------
const parseMoney = (str) => {
  if (str == null) return 0;
  if (typeof str === 'number') return str;
  let s = String(str).replace(/[$,\s]/g, '');
  if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1, -1);
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
};
const fmtMoney = (n) => {
  if (!n && n !== 0) return '—';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 0 });
};
const fmtMoneyFull = (n) => '$' + (n || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = (n) => (n || 0).toLocaleString();
const parseDate = (str) => {
  if (!str) return null;
  const s = String(str).trim();
  const ymd = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (ymd) return new Date(+ymd[1], +ymd[2] - 1, +ymd[3]);
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (mdy) return new Date(+mdy[3], +mdy[1] - 1, +mdy[2]);
  const d = new Date(s);
  return isNaN(d) ? null : d;
};
const ymdStr = (d) => {
  if (!(d instanceof Date) || isNaN(d)) return '';
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
};
const PIE_COLORS = ['#68ba7f', '#4d9461', '#8fcba0', '#e0a85a', '#cfffdc', '#e07594', '#9dc1a9', '#688a73'];

// --- App --------------------------------------------------------------------
function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    const tryGz = async () => {
      const r = await fetch('sales_data.json.gz?t=' + Date.now());
      if (!r.ok) throw new Error('no gz');
      const buf = new Uint8Array(await r.arrayBuffer());
      let text;
      try {
        // Normal case: GitHub serves the raw gzip bytes; inflate them.
        text = pako.inflate(buf, { to: 'string' });
      } catch (e) {
        // Edge case: a CDN already decoded it (Content-Encoding: gzip) → it's plain text.
        text = new TextDecoder().decode(buf);
      }
      return JSON.parse(text);
    };
    const tryPlain = async (name) => {
      const r = await fetch(name + '?t=' + Date.now());
      if (!r.ok) throw new Error('no ' + name);
      return r.json();
    };
    const load = () => {
      tryGz()
        .catch(() => tryPlain('sales_data.json'))
        .catch(() => tryPlain('sales_data.preview.json'))
        .then(setData)
        .catch(() => setError('Could not load sales_data.json.gz'));
    };
    load();
    const id = setInterval(load, 60000);
    return () => clearInterval(id);
  }, []);

  if (error) return (
    <div className="app"><div className="empty">
      <h2>No data yet</h2>
      <p>Place <code>sales_data.json</code> next to this file, then refresh.</p>
      <p style={{ marginTop: 12, fontSize: 12, color: 'var(--text-faint)' }}>{error}</p>
    </div></div>
  );
  if (!data) return <div className="app"><div className="empty"><h2>Loading…</h2></div></div>;
  return <Dashboard data={data} />;
}

// --- Dashboard --------------------------------------------------------------
function Dashboard({ data }) {
  const rawRows = data.rows || [];
  const [activeBrand, setActiveBrand] = useState('ALL');
  const [otherSub, setOtherSub] = useState('');
  const [scope, setScope] = useState('external');  // external | internal | total
  const selectBrand = (b) => { setActiveBrand(b); if (b !== OTHER_BRANDS_LABEL) setOtherSub(''); };
  const [filters, setFilters] = useState({ from: '', to: '', buyer: '', rep: '', state: '', status: '', search: '', excludeSamples: false });

  // Normalize + classify every row once.
  const all = useMemo(() => rawRows.map(r => {
    const bucket = classifyAccount(r.buyer_name);
    return {
      ...r,
      _bucket: bucket,
      brand: displayBrand(r.brand),
      _otherName: PRIMARY_BRANDS.includes((r.brand || '').trim()) ? '' : otherName(r.brand),
      _date: parseDate(r.order_date),
      _delivery: parseDate(r.delivery_date),
      _revenue: typeof r.revenue === 'number' ? r.revenue : parseMoney(r.revenue),
      _gross: typeof r.gross === 'number' ? r.gross : parseMoney(r.gross),
      _discount: typeof r.discount === 'number' ? r.discount : parseMoney(r.discount),
      _units: parseFloat(r.units_sold != null ? r.units_sold : r.quantity) || 0,
      _invoice: r.order_number || r.order_uid || '',
      _invoiceId: r.order_uid || r.order_number || '',
      _isSample: !!r.is_sample,
    };
  }), [rawRows]);

  // Excluded accounts are dropped from EVERYTHING.
  const kept = useMemo(() => all.filter(r => r._bucket !== 'excluded'), [all]);
  const excludedRows = useMemo(() => all.filter(r => r._bucket === 'excluded'), [all]);

  // Primary brand tabs (everything except the Other Brands group), by wholesale rev.
  const brandTabs = useMemo(() => {
    const map = {};
    kept.forEach(r => { if (r.brand === OTHER_BRANDS_LABEL) return; map[r.brand] = (map[r.brand] || 0) + (r._bucket === 'wholesale' ? r._revenue : 0); });
    return Object.entries(map).map(([name, rev]) => ({ name, rev })).sort((a, b) => b.rev - a.rev);
  }, [kept]);

  // The Other Brands group: its wholesale total + the real brands inside it.
  const otherInfo = useMemo(() => {
    const rows = kept.filter(r => r.brand === OTHER_BRANDS_LABEL);
    if (!rows.length) return null;
    const rev = rows.filter(r => r._bucket === 'wholesale').reduce((s, r) => s + r._revenue, 0);
    const m = {};
    rows.forEach(r => { const n = r._otherName || '(unlabeled)'; if (!m[n]) m[n] = { name: n, rev: 0 }; m[n].rev += r._revenue; });
    return { rev, constituents: Object.values(m).sort((a, b) => b.rev - a.rev) };
  }, [kept]);

  // Ordered list for the filter dropdown: primaries first, Other Brands always last.
  const brands = useMemo(
    () => [...brandTabs, ...(otherInfo ? [{ name: OTHER_BRANDS_LABEL, rev: otherInfo.rev }] : [])],
    [brandTabs, otherInfo]
  );

  // Rows for the active brand (ALL = no brand filter), before UI filters.
  const brandRows = useMemo(() => {
    if (activeBrand === 'ALL') return kept;
    let rows = kept.filter(r => r.brand === activeBrand);
    if (activeBrand === OTHER_BRANDS_LABEL && otherSub) rows = rows.filter(r => r._otherName === otherSub);
    return rows;
  }, [kept, activeBrand, otherSub]);

  // Apply UI filters.
  const applyFilters = (rows) => rows.filter(r => {
    if (filters.from || filters.to) {
      if (!r._date) return false;
      const d = ymdStr(r._date);
      if (filters.from && d < filters.from) return false;
      if (filters.to && d > filters.to) return false;
    }
    if (filters.buyer && r.buyer_name !== filters.buyer) return false;
    if (filters.rep && r.sales_rep !== filters.rep) return false;
    if (filters.state && r.buyer_state !== filters.state) return false;
    if (filters.status && r.payment_status !== filters.status) return false;
    if (filters.excludeSamples && r._isSample) return false;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const hay = `${r._invoice} ${r.buyer_name} ${r.product_name}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const filtered = useMemo(() => applyFilters(brandRows), [brandRows, filters]);
  const wholesale = useMemo(() => filtered.filter(r => r._bucket === 'wholesale'), [filtered]);
  const internal = useMemo(() => filtered.filter(r => r._bucket === 'internal'), [filtered]);

  // Segment totals for the External / Internal / Total scope cards.
  const segRev = useMemo(() => {
    const ext = wholesale.reduce((s, r) => s + r._revenue, 0);
    const int = internal.reduce((s, r) => s + r._revenue, 0);
    const eo = new Set(wholesale.map(r => r._invoiceId).filter(Boolean)).size;
    const io = new Set(internal.map(r => r._invoiceId).filter(Boolean)).size;
    const to = new Set(filtered.map(r => r._invoiceId).filter(Boolean)).size;
    return { external: { rev: ext, orders: eo }, internal: { rev: int, orders: io }, total: { rev: ext + int, orders: to } };
  }, [wholesale, internal, filtered]);
  const scopeRows = scope === 'external' ? wholesale : scope === 'internal' ? internal : filtered;
  const scopeHeading = scope === 'external' ? 'External' : scope === 'internal' ? 'Internal' : 'Total';

  // Distinct values for filter dropdowns (from brand rows, both buckets).
  const distinct = useMemo(() => ({
    buyers: [...new Set(brandRows.filter(r => r._bucket === 'wholesale').map(r => r.buyer_name).filter(Boolean))].sort(),
    reps: [...new Set(brandRows.map(r => r.sales_rep).filter(Boolean))].sort(),
    states: [...new Set(brandRows.map(r => r.buyer_state).filter(Boolean))].sort(),
    statuses: [...new Set(brandRows.map(r => r.payment_status).filter(Boolean))].sort(),
  }), [brandRows]);

  const resetFilters = () => setFilters({ from: '', to: '', buyer: '', rep: '', state: '', status: '', search: '', excludeSamples: false });

  const fetchedAt = new Date(data.fetched_at);
  const brandLabel = activeBrand === 'ALL' ? 'All Brands'
    : (activeBrand === OTHER_BRANDS_LABEL && otherSub) ? 'Other Brands › ' + otherSub
    : activeBrand;

  return (
    <div className="app">
      <Topbar fetchedAt={fetchedAt} data={data} keptCount={kept.length} excludedCount={excludedRows.length} />

      <TabBar brandTabs={brandTabs} otherInfo={otherInfo} active={activeBrand} setActive={selectBrand} otherSub={otherSub} setOtherSub={setOtherSub} kept={kept} />

      <AccountRouting all={all} kept={kept} excludedRows={excludedRows} />

      <QuickRanges filters={filters} setFilters={setFilters} />

      <FilterBar filters={filters} setFilters={setFilters} distinct={distinct} onReset={resetFilters}
        brands={brands} activeBrand={activeBrand} setActiveBrand={selectBrand} />

      <ScopeCards seg={segRev} scope={scope} setScope={setScope} />

      {activeBrand === 'ALL' && scope !== 'internal' && <BrandOverview kept={applyFilters(kept)} />}

      <WholesaleView rows={scopeRows} brandLabel={brandLabel} heading={scopeHeading} />

      <InventorySection inventory={data.inventory} activeBrand={activeBrand} otherSub={otherSub} brandLabel={brandLabel} />

      <footer style={{ marginTop: 60, padding: '20px 0', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--text-faint)', textTransform: 'uppercase', letterSpacing: '0.12em' }}>
        <span>Medfarms · Michigan · Sales Intelligence</span>
        <span>Auto-refresh every 60s</span>
      </footer>
    </div>
  );
}

    const m = {}; rows.forEach(r => { const key = r.payment_status || 'Unknown'; m[key] = (m[key] || 0) + r._revenue; });

        <Kpi label="Orders / Invoices" value={fmtNum(k.orders)} sub={`${fmtMoney(k.avgOrder)} avg order`} />
        <Kpi label="Units Sold" value={fmtNum(Math.round(k.units))} sub={`${k.avgUnitsPerOrder.toFixed(1)} units / order`} />

        <Kpi label="Markets" value={fmtNum(k.states)} sub="states with sales" />
        <Kpi label="Gross Sales" value={fmtMoney(k.gross)} sub="before discounts" />
        <Kpi label="Discounts" value={fmtMoney(k.discounts)} sub={k.gross ? ((k.discounts / k.gross) * 100).toFixed(1) + '% of gross' : '—'} />
      </div>

      <section className="section">
        <div className="section-header"><h2 className="section-title">Revenue <em>over time</em></h2><span className="section-meta">{timeSeries.length} days</span></div>
        <div className="card" style={{ height: 300 }}>
          <ResponsiveContainer width="100%" height="100%">
            <AreaChart data={timeSeries} margin={{ top: 12, right: 12, left: 0, bottom: 0 }}>
              <defs><linearGradient id="rev" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#68ba7f" stopOpacity={0.4} /><stop offset="100%" stopColor="#68ba7f" stopOpacity={0} /></linearGradient></defs>
              <CartesianGrid stroke="#33543e" strokeDasharray="2 2" vertical={false} />
              <XAxis dataKey="date" stroke="#688a73" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} tickLine={false} axisLine={{ stroke: '#33543e' }} />
              <YAxis stroke="#688a73" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} tickLine={false} axisLine={false} tickFormatter={fmtMoney} />
              <Tooltip contentStyle={{ background: '#1c2f22', border: '1px solid #33543e', borderRadius: 4, fontSize: 12 }} labelStyle={{ color: '#9dc1a9', fontFamily: 'JetBrains Mono', fontSize: 11 }} formatter={(v, n) => n === 'revenue' ? [fmtMoneyFull(v), 'Revenue'] : [fmtNum(v), n]} />
              <Area type="monotone" dataKey="revenue" stroke="#68ba7f" strokeWidth={2} fill="url(#rev)" />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </section>

      <InvoiceTable invoices={invoices} title="Invoices" accent="var(--accent)" />

      <ProductBreakdown rows={rows} showBrand={brandLabel === 'All Brands'} />

      <section className="section">
        <div className="section-header"><h2 className="section-title">Payment <em>status</em></h2><span className="section-meta">AR mix</span></div>
        <div className="card"><RankList data={paymentMix} /></div>
      </section>

      <section className="section"><div className="grid-half">
        <RankCard title="Top products" data={topProducts} />
        <RankCard title="Top buyers" data={topBuyers} />
      </div></section>

      <section className="section"><div className="grid-2">
        <div>
          <div className="section-header"><h2 className="section-title">Sales <em>by rep</em></h2><span className="section-meta">{byRep.length} reps</span></div>
          <div className="card" style={{ height: 360 }}>

                <XAxis type="number" stroke="#688a73" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} tickFormatter={fmtMoney} axisLine={false} tickLine={false} />

            <ResponsiveContainer width="100%" height="100%">

                <Legend verticalAlign="bottom" iconType="square" wrapperStyle={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: '#9dc1a9' }} />

            </ResponsiveContainer>
          </div>
        </div>
      </div></section>

      <section className="section">
        <div className="section-header"><h2 className="section-title">By <em>state</em></h2><span className="section-meta">geography</span></div>
        <div className="card"><RankList data={byState} /></div>
      </section>

      <MonthlyTable months={months} />
    </>
  );
}

// --- Internal stores view ---------------------------------------------------
function InternalView({ rows, brandLabel }) {
  const k = useMemo(() => kpis(rows), [rows]);
  const byStore = useMemo(() => {
    const m = {};
    rows.forEach(r => {
      const key = r.buyer_name || '—';
      if (!m[key]) m[key] = { name: key, revenue: 0, units: 0, orders: new Set() };
      m[key].revenue += r._revenue; m[key].units += r._units;
      if (r._invoiceId) m[key].orders.add(r._invoiceId);
    });
    return Object.values(m).map(s => ({ ...s, orders: s.orders.size })).sort((a, b) => b.revenue - a.revenue);
  }, [rows]);
  const invoices = useMemo(() => buildInvoices(rows), [rows]);

  return (
    <div className="internal-zone">
      <span className="internal-badge">Internal Stores · own segment</span>
      <div className="section-header" style={{ marginBottom: 16 }}>
        <h2 className="section-title">Internal <em>store sales</em></h2>
        <span className="section-meta">{brandLabel} · not in wholesale totals</span>
      </div>

      <div className="kpi-grid">
        <Kpi label="Internal Revenue" value={fmtMoney(k.revenue)} sub={`${fmtNum(k.lineItems)} line items`} accent />
        <Kpi label="Internal Orders" value={fmtNum(k.orders)} sub={`${fmtMoney(k.avgOrder)} avg order`} />
        <Kpi label="Units Moved" value={fmtNum(Math.round(k.units))} sub={`${k.avgUnitsPerOrder.toFixed(1)} units / order`} />
        <Kpi label="Stores Active" value={fmtNum(byStore.length)} sub="of 6 internal stores" />
      </div>

      <section className="section">
        <div className="section-header"><h2 className="section-title">By <em>store</em></h2><span className="section-meta">{byStore.length} stores</span></div>
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <table className="data-table">
            <thead><tr><th>Store</th><th className="num">Orders</th><th className="num">Units</th><th className="num">Revenue</th></tr></thead>
            <tbody>
              {byStore.length === 0 && <tr><td colSpan="4" style={{ textAlign: 'center', color: 'var(--text-faint)', padding: 28 }}>No internal store activity in this view</td></tr>}
              {byStore.map((s, i) => (
                <tr key={i}>
                  <td style={{ color: 'var(--internal)' }}>{s.name}</td>
                  <td className="num dim">{fmtNum(s.orders)}</td>
                  <td className="num">{fmtNum(Math.round(s.units))}</td>
                  <td className="num"><strong>{fmtMoneyFull(s.revenue)}</strong></td>
                </tr>
              ))}
              {byStore.length > 0 && (
                <tr style={{ background: 'var(--bg-elev-2)', fontWeight: 600 }}>
                  <td>TOTAL</td>
                  <td className="num dim">{fmtNum(byStore.reduce((s, x) => s + x.orders, 0))}</td>
                  <td className="num">{fmtNum(Math.round(byStore.reduce((s, x) => s + x.units, 0)))}</td>
                  <td className="num" style={{ color: 'var(--internal)' }}>{fmtMoneyFull(byStore.reduce((s, x) => s + x.revenue, 0))}</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </section>

      <InvoiceTable invoices={invoices} title="Internal invoices" accent="var(--internal)" />
    </div>
  );
}

// --- All-brands overview ----------------------------------------------------
function BrandOverview({ kept }) {
  const byBrand = useMemo(() => {
    const m = {};
    kept.forEach(r => {
      const b = r.brand;
      if (!m[b]) m[b] = { name: b, wholesale: 0, internal: 0, units: 0, orders: new Set() };
      if (r._bucket === 'internal') m[b].internal += r._revenue; else m[b].wholesale += r._revenue;
      m[b].units += r._units;
      if (r._invoiceId) m[b].orders.add(r._invoiceId);
    });
    return Object.values(m).map(b => ({ ...b, orders: b.orders.size, total: b.wholesale + b.internal }))
      .sort((a, b) => b.total - a.total);
  }, [kept]);

  if (byBrand.length <= 1) return null; // nothing to compare until multiple brands are pulled

  return (
    <section className="section">
      <div className="section-header"><h2 className="section-title">Brand <em>comparison</em></h2><span className="section-meta">{byBrand.length} brands</span></div>
      <div className="grid-2">
        <div className="card" style={{ height: 340 }}>
          <ResponsiveContainer width="100%" height="100%">
            <BarChart data={byBrand} layout="vertical" margin={{ top: 8, right: 16, left: 8, bottom: 8 }}>
              <CartesianGrid stroke="#33543e" strokeDasharray="2 2" horizontal={false} />
              <XAxis type="number" stroke="#688a73" tick={{ fontSize: 11, fontFamily: 'JetBrains Mono' }} tickFormatter={fmtMoney} axisLine={false} tickLine={false} />
              <YAxis type="category" dataKey="name" stroke="#688a73" tick={{ fontSize: 11 }} width={150} axisLine={false} tickLine={false} />
              <Tooltip contentStyle={{ background: '#1c2f22', border: '1px solid #33543e', borderRadius: 4, fontSize: 12 }} formatter={(v, n) => [fmtMoneyFull(v), n === 'wholesale' ? 'Wholesale' : 'Internal']} />
              <Legend wrapperStyle={{ fontSize: 11, fontFamily: 'JetBrains Mono', color: '#9dc1a9' }} />
              <Bar dataKey="wholesale" stackId="a" fill="#68ba7f" radius={[0, 0, 0, 0]} />
              <Bar dataKey="internal" stackId="a" fill="#cfffdc" radius={[0, 2, 2, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <table className="data-table">
            <thead><tr><th>Brand</th><th className="num">Wholesale</th><th className="num">Internal</th><th className="num">Total</th></tr></thead>
            <tbody>
              {byBrand.map((b, i) => (
                <tr key={i}>
                  <td>{b.name}</td>
                  <td className="num">{fmtMoney(b.wholesale)}</td>
                  <td className="num" style={{ color: 'var(--internal)' }}>{fmtMoney(b.internal)}</td>
                  <td className="num"><strong>{fmtMoney(b.total)}</strong></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </section>
  );
}

// --- Shared compute ---------------------------------------------------------
function kpis(rows) {
  const revenue = rows.reduce((s, r) => s + r._revenue, 0);
  const gross = rows.reduce((s, r) => s + r._gross, 0);
  const discounts = rows.reduce((s, r) => s + r._discount, 0);
  const units = rows.reduce((s, r) => s + r._units, 0);
  const orderIds = new Set(rows.map(r => r._invoiceId).filter(Boolean));
  const buyers = new Set(rows.map(r => r.buyer_name).filter(Boolean));
  const states = new Set(rows.map(r => r.buyer_state).filter(Boolean));
  const byMonth = {};
  rows.forEach(r => { if (!r._date) return; const ym = `${r._date.getFullYear()}-${String(r._date.getMonth() + 1).padStart(2, '0')}`; byMonth[ym] = (byMonth[ym] || 0) + r._revenue; });
  const mk = Object.keys(byMonth).sort();
  let momChange = null, momLabel = '—';
  if (mk.length >= 2) { const a = byMonth[mk[mk.length - 1]], b = byMonth[mk[mk.length - 2]]; if (b) { momChange = ((a - b) / b) * 100; momLabel = mk[mk.length - 1] + ' vs ' + mk[mk.length - 2]; } }
  return { revenue, gross, discounts, units, orders: orderIds.size, buyers: buyers.size, states: states.size,
    avgOrder: orderIds.size ? revenue / orderIds.size : 0, avgUnitsPerOrder: orderIds.size ? units / orderIds.size : 0,
    momChange, momLabel, lineItems: rows.length };
}
function series(rows) {
  const m = {};
  rows.forEach(r => { if (!r._date) return; const key = ymdStr(r._date); if (!m[key]) m[key] = { date: key, revenue: 0 }; m[key].revenue += r._revenue; });
  return Object.values(m).sort((a, b) => a.date.localeCompare(b.date));
}
function groupSum(rows, key, n = 10) {
  const m = {};
  rows.forEach(r => { const k = r[key]; if (!k) return; if (!m[k]) m[k] = { name: k, revenue: 0, units: 0 }; m[k].revenue += r._revenue; m[k].units += r._units; });
  return Object.values(m).sort((a, b) => b.revenue - a.revenue).slice(0, n);
}
function monthly(rows) {
  const m = {};
  rows.forEach(r => {
    if (!r._date) return;
    const key = `${r._date.getFullYear()}-${String(r._date.getMonth() + 1).padStart(2, '0')}`;
    if (!m[key]) m[key] = { key, monthName: r._date.toLocaleString('en-US', { month: 'long', year: 'numeric' }), units: 0, gross: 0, discounts: 0, net: 0 };
    m[key].units += r._units; m[key].gross += r._gross; m[key].discounts += r._discount; m[key].net += r._revenue;
  });
  const sorted = Object.values(m).sort((a, b) => a.key.localeCompare(b.key));
  return sorted.map((x, i) => { const prev = i > 0 ? sorted[i - 1].net : 0; const mom = prev ? ((x.net - prev) / prev) * 100 : null; return { ...x, mom }; });
}
function buildInvoices(rows) {
  const m = {};
  rows.forEach(r => {
    const id = r._invoiceId; if (!id) return;
    if (!m[id]) m[id] = { id, invoice: r._invoice, date: r.order_date ? ymdStr(r._date) : '—', _t: r._date ? r._date.getTime() : 0,
      buyer: r.buyer_name || '—', rep: r.sales_rep || '—', state: r.buyer_state || '—', status: r.payment_status || 'Unknown', brand: r.brand, lineItems: 0, units: 0, revenue: 0, discount: 0 };
    m[id].lineItems += 1; m[id].units += r._units; m[id].revenue += r._revenue; m[id].discount += r._discount;
  });
  return Object.values(m).sort((a, b) => b._t - a._t);
}

function AccountRouting({ all, kept, excludedRows }) {
  const summarize = (rows) => {
    const m = {};
    rows.forEach(r => { const b = r.buyer_name || '(blank)'; if (!m[b]) m[b] = { name: b, rev: 0, n: new Set() }; m[b].rev += r._revenue; if (r._invoiceId) m[b].n.add(r._invoiceId); });
    return Object.values(m).map(x => ({ ...x, n: x.n.size })).sort((a, b) => b.rev - a.rev);
  };
  const excluded = summarize(excludedRows);
  const internal = summarize(kept.filter(r => r._bucket === 'internal'));
  // "Dispo - " accounts that landed in wholesale — likely candidates to reclassify.
  const dispoInWholesale = summarize(kept.filter(r => r._bucket === 'wholesale' && /^dispo\s*-/i.test(r.buyer_name || '')));
  const Row = ({ d, color }) => (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 90px 70px', gap: '2px 12px', padding: '3px 0' }}>

      <span className="num" style={{ textAlign: 'right' }}>{fmtMoney(d.rev)}</span>
      <span className="num" style={{ textAlign: 'right', color: 'var(--text-faint)' }}>{d.n} ord</span>
    </div>
  );
  return (
    <details style={{ background: 'var(--bg-elev)', border: '1px solid var(--border)', borderRadius: 4, padding: '10px 16px', marginBottom: 24, fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'var(--text-dim)' }}>
      <summary style={{ cursor: 'pointer', color: 'var(--accent)' }}>ACCOUNT ROUTING — verify which accounts go where (click to expand)</summary>
      <div style={{ marginTop: 12, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 }}>
        <div>
          <div style={{ color: 'var(--rose)', marginBottom: 6, fontWeight: 600 }}>EXCLUDED — removed from all totals ({excluded.length})</div>
          {excluded.length === 0 ? <div style={{ color: 'var(--text-faint)' }}>none in data</div> : excluded.map((d, i) => <Row key={i} d={d} color="var(--rose)" />)}
        </div>
        <div>
          <div style={{ color: 'var(--internal)', marginBottom: 6, fontWeight: 600 }}>INTERNAL STORES — own segment ({internal.length})</div>
          {internal.length === 0 ? <div style={{ color: 'var(--text-faint)' }}>none in data</div> : internal.map((d, i) => <Row key={i} d={d} color="var(--internal)" />)}
        </div>
        <div>
          <div style={{ color: 'var(--warm)', marginBottom: 6, fontWeight: 600 }}>"Dispo -" still in WHOLESALE — confirm? ({dispoInWholesale.length})</div>
          {dispoInWholesale.length === 0 ? <div style={{ color: 'var(--text-faint)' }}>none</div> : dispoInWholesale.map((d, i) => <Row key={i} d={d} color="var(--warm)" />)}
        </div>

      </div>
    </details>
  );
}

          <div className="card" style={{ padding: 0, overflow: 'hidden' }}><div style={{ overflowX: 'auto', maxHeight: 520 }}>
            <table className="data-table">
              <thead><tr><th>Product</th>{showBrandCol && <th>Brand</th>}<th>Line</th><th className="num">Available</th><th className="num">Reserved</th><th className="num">Total</th><th>Status</th></tr></thead>
              <tbody>
                {sorted.slice(0, 200).map((p, i) => {
                  const a = availOf(p), rsv = num(p.reserved), tt = num(p.inventory);
                  return (
                    <tr key={i}>
                      <td>{p.name || '—'}</td>
                      {showBrandCol && <td className="dim">{p.brand || '—'}</td>}
                      <td className="dim">{p.line || '—'}</td>
                      <td className="num"><strong style={{ color: (a || 0) <= 0 ? 'var(--rose)' : 'var(--text)' }}>{a == null ? '—' : fmtNum(Math.round(a))}</strong></td>
                      <td className="num dim">{rsv == null ? '—' : fmtNum(Math.round(rsv))}</td>
                      <td className="num dim">{tt == null ? '—' : fmtNum(Math.round(tt))}</td>
                      <td><InvStatus status={p.status} avail={a} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {sorted.length > 200 && <div style={{ padding: '12px 16px', fontFamily: 'JetBrains Mono', fontSize: 11, color: 'var(--text-faint)', textAlign: 'center', borderTop: '1px solid var(--border)' }}>Showing 200 of {fmtNum(sorted.length)} products</div>}
          </div>
        </>
      )}
    </section>
  );
}

function Kpi({ label, value, sub, accent }) {
  return (<div className={'kpi' + (accent ? ' kpi-accent' : '')}><div className="kpi-label">{label}</div><div className="kpi-value tabular">{value}</div>{sub && <div className="kpi-sub">{sub}</div>}</div>);
}
function RankCard({ title, data }) {
  return (<div><div className="section-header"><h2 className="section-title">{title.split(' ')[0]} <em>{title.split(' ').slice(1).join(' ')}</em></h2><span className="section-meta">top {data.length}</span></div><div className="card"><RankList data={data} /></div></div>);
}
function RankList({ data }) {
  const max = Math.max(...data.map(d => d.revenue), 1);
  return (<div className="rank-list">
    {data.length === 0 && <div style={{ padding: 20, color: 'var(--text-faint)', textAlign: 'center', fontSize: 13 }}>No data</div>}
    {data.map((d, i) => (<div key={i} className="rank-row"><div className="rank-num">{String(i + 1).padStart(2, '0')}</div><div className="rank-name" title={d.name}>{d.name}</div><div className="rank-value">{fmtMoneyFull(d.revenue)}</div><div className="rank-bar" style={{ width: `calc(${(d.revenue / max * 100).toFixed(1)}% - 80px)` }}></div></div>))}
  </div>);
}
function StatusPill({ status }) {
  if (!status) return <span className="dim">—</span>;
  const s = status.toLowerCase();
  const cls = (s.includes('paid') && !s.includes('unpaid')) || s.includes('complet') ? 'pill-completed' : s.includes('overdue') ? 'pill-overdue' : 'pill-pending';
  return <span className={'pill ' + cls}>{status}</span>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
/* Fail-loud watchdog: if the React app hasn't mounted a few seconds after load
   (e.g. a CDN was blocked and the babel script never ran), replace the blank
   screen with a clear, actionable message instead of nothing. */
(function () {
  function diagnose() {
    var root = document.getElementById('root');
    if (!root || root.childElementCount > 0) return; // app mounted (or is showing Loading) — all good
    var libs = { React: typeof window.React, ReactDOM: typeof window.ReactDOM, Recharts: typeof window.Recharts, Babel: typeof window.Babel, pako: typeof window.pako };
    var missing = Object.keys(libs).filter(function (k) { return libs[k] === 'undefined'; });
    var why = missing.length
      ? 'These libraries did not load: <b>' + missing.join(', ') + '</b>. That is almost always a blocked CDN — a work network / VPN firewall, or an ad- or script-blocking browser extension — not the dashboard itself.'
      : 'The libraries loaded but the app did not render. A hard refresh usually clears this.';
    root.innerHTML =
      '<div style="max-width:640px;margin:80px auto;padding:28px;background:#1c2f22;border:1px solid #33543e;border-left:3px solid #e0a85a;border-radius:10px;color:#eaf6ed;font-family:Inter,system-ui,sans-serif">'
      + '<div style="font-family:Fraunces,serif;font-size:22px;font-style:italic;margin-bottom:10px">Dashboard didn\u2019t load</div>'
      + '<p style="color:#9dc1a9;line-height:1.7;font-size:14px;margin:0 0 12px">' + why + '</p>'
      + '<ul style="color:#9dc1a9;line-height:1.85;font-size:13px;margin:0 0 16px 18px">'
      + '<li>Hard refresh: <b>Ctrl/Cmd + Shift + R</b></li>'
      + '<li>Try an <b>Incognito</b> window (extensions are disabled there)</li>'
      + '<li>On a work network or VPN, <b>unpkg.com</b> and <b>jsdelivr.net</b> may be blocked</li>'
      + '</ul>'
      + '<button onclick="location.reload()" style="background:#68ba7f;border:none;color:#15241a;font-weight:600;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:JetBrains Mono,monospace;font-size:12px">Reload</button>'
      + '</div>';
  }
  setTimeout(diagnose, 5000);
})();
</script>
</body>
</html>
